<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>OneVoice</title>
<style>
  :root{--teal:#15C2B2;--teal-d:#0B8C80;--ink:#1A2233;--mut:#5a6677;--line:#e8ebf1;--ok:#12a150;--warn:#b45309;}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:Inter,-apple-system,'Segoe UI',Roboto,sans-serif;background:transparent;color:var(--ink);padding:4px 2px}
  .wrap{max-width:1280px;margin:0 auto;display:grid;gap:14px}
  .card{background:#fff;border:1px solid var(--line);border-radius:14px;box-shadow:0 1px 2px rgba(16,24,40,.04)}
  .kicker{font-size:11px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--teal-d)}
  h2{font-size:16px;font-weight:750;margin-top:2px}
  .hdr{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:16px 22px;border-bottom:1px solid var(--line)}
  .hdr h1{font-size:18px;font-weight:800}
  .hdr p{font-size:12.5px;color:var(--mut);margin-top:2px}
  .logo{font-weight:800;font-size:15px;color:var(--teal-d)}.logo span{color:var(--ink)}
  .badge{font-size:11px;font-weight:800;letter-spacing:.8px;text-transform:uppercase;color:var(--teal-d);background:rgba(21,194,178,.1);border:1px solid rgba(21,194,178,.35);padding:5px 10px;border-radius:999px}
  .steps{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;padding:14px 22px 20px}
  @media(max-width:760px){.steps{grid-template-columns:1fr}}
  .step{border:1px solid var(--line);border-radius:12px;padding:14px;display:flex;flex-direction:column;gap:8px}
  .step .top{display:flex;align-items:center;gap:9px}
  .stepnum{font-size:10.5px;font-weight:800;letter-spacing:.7px;color:var(--mut);text-transform:uppercase}
  .step h3{font-size:14px;font-weight:700}
  .step p{font-size:12.5px;color:var(--mut);line-height:1.5;flex:1}
  .chk{width:22px;height:22px;border-radius:50%;border:2px solid #cdd4de;display:inline-flex;align-items:center;justify-content:center;flex:none;font-size:13px;color:#fff}
  .done .chk{background:var(--ok);border-color:var(--ok)}
  .done{border-color:rgba(18,161,80,.35);background:#f6fdf9}
  .done h3{text-decoration:line-through;color:var(--mut)}
  .cta{display:inline-block;text-align:center;font-size:12.5px;font-weight:700;color:#fff;background:var(--teal-d);border:none;border-radius:8px;padding:9px 12px;text-decoration:none;cursor:pointer}
  .cta.ghost{background:#fff;color:var(--teal-d);border:1.5px solid var(--teal-d)}
  .done .cta{display:none}
  .sec-h{padding:16px 22px 6px;display:flex;align-items:center;justify-content:space-between;gap:10px}
  table{width:100%;border-collapse:collapse}
  th{font-size:10.5px;font-weight:800;letter-spacing:.8px;text-transform:uppercase;color:var(--mut);text-align:left;padding:10px 22px;border-bottom:1px solid var(--line)}
  td{padding:13px 22px;border-bottom:1px solid var(--line);font-size:14px;vertical-align:middle}
  tbody tr:last-child td{border-bottom:none}
  .addr{font-weight:700;color:var(--teal-d);cursor:pointer;text-decoration:underline;text-decoration-color:rgba(11,140,128,.35);text-underline-offset:3px}
  .agent{display:inline-flex;align-items:center;gap:9px;cursor:pointer}
  .agent .nm{font-weight:600;color:var(--teal-d);text-decoration:underline;text-decoration-color:rgba(11,140,128,.35);text-underline-offset:3px}
  .av{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--teal),var(--teal-d));color:#fff;font-size:12.5px;font-weight:800;display:inline-flex;align-items:center;justify-content:center;flex:none}
  .num{font-variant-numeric:tabular-nums;font-weight:700;color:var(--teal-d)}
  .pill{font-size:11px;font-weight:800;padding:4px 10px;border-radius:999px;white-space:nowrap}
  .pill.live{color:var(--ok);background:rgba(18,161,80,.09);border:1px solid rgba(18,161,80,.3)}
  .pill.wait{color:var(--warn);background:#fef8ec;border:1px solid #f2dfb3}
  .hint{font-size:11.5px;color:var(--mut);padding:8px 22px 14px}
  .mng{display:flex;gap:10px;flex-wrap:wrap;padding:6px 22px 18px}
  .mng button{font-size:12.5px;font-weight:700;border-radius:8px;padding:9px 14px;cursor:pointer;border:1.5px solid var(--teal-d);background:#fff;color:var(--teal-d)}
  .mng button.primary{background:var(--teal-d);color:#fff}
  .rowbtn{font-size:11px;font-weight:700;border-radius:7px;padding:5px 9px;cursor:pointer;border:1.2px solid var(--teal-d);background:#fff;color:var(--teal-d)}
  .rowbtn.danger{border-color:#d9822b;color:#b45309}
  .rowbtn.primaryish{background:var(--teal-d);color:#fff}
  .calls .row-main{cursor:pointer}
  .cdet{background:#fbfcfe;border-top:1px dashed var(--line)}
  .cdet td{padding:12px 22px}
  .kv{display:grid;grid-template-columns:150px 1fr;gap:4px 14px;font-size:13px}
  .kv b{color:var(--mut);font-weight:700;font-size:11px;letter-spacing:.6px;text-transform:uppercase;padding-top:2px}
  .scorebig{font-weight:800;color:var(--teal-d)}
  .empty{padding:24px 22px;color:var(--mut);font-size:13.5px}
  .foot{font-size:12px;color:var(--mut);padding:2px 4px 8px;text-align:right}
  /* modal */
  .ovl{position:fixed;inset:0;background:rgba(16,24,40,.45);display:none;align-items:center;justify-content:center;z-index:50;padding:16px}
  .ovl.on{display:flex}
  .modal{background:#fff;border-radius:14px;max-width:520px;width:100%;max-height:92vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 20px 50px rgba(16,24,40,.25)}
  .modal.wide{max-width:780px}
  .planwrap{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:12px}
  .plancard{border:1.5px solid var(--line);border-radius:12px;padding:14px}
  .plancard.cur{border-color:var(--teal-d)}
  .plancard .ph{display:flex;align-items:center;justify-content:space-between}
  .plancard .pn{font-size:15px;font-weight:800}
  .curpill{font-size:10px;font-weight:800;letter-spacing:.4px;text-transform:uppercase;color:#fff;background:var(--teal-d);border-radius:999px;padding:2px 8px;margin-left:6px}
  .ptag{font-size:12px;color:var(--mut);margin:3px 0 9px}
  .plusline{font-size:11.5px;font-weight:800;color:var(--mut);margin-bottom:6px}
  .pfeat{list-style:none;margin:0 0 12px;padding:0;display:grid;gap:6px}
  .pfeat li{font-size:12.5px;color:#2a3340;padding-left:18px;position:relative;line-height:1.35}
  .pfeat li:before{content:'✓';position:absolute;left:0;color:var(--teal-d);font-weight:800}
  .terms{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px}
  .tbtn{border:1.5px solid var(--line);border-radius:9px;padding:8px 5px;background:#fff;cursor:pointer;text-align:center}
  .tbtn:hover{border-color:var(--teal-d)}
  .tbtn.cur{border-color:var(--teal-d);background:#eafaf7;cursor:default}
  .tbtn .tt{font-size:11px;font-weight:700;color:#3a4553}
  .tbtn .tp{font-size:13px;font-weight:800;margin:2px 0}
  .tbtn .tn{font-size:9.5px;font-weight:800;letter-spacing:.2px;color:var(--teal-d);text-transform:uppercase}
  .cprow{display:flex;justify-content:space-between;gap:14px;padding:9px 0;border-bottom:1px solid #eef1f4}
  .cprow>span{color:var(--mut);flex:0 0 auto;padding-top:1px}
  .cprow b{text-align:right;font-weight:700}
  .cprow .sub{font-size:11px;color:var(--mut);font-weight:600;margin-top:2px}
  .cprow.tot{border-bottom:none;align-items:baseline}
  .cprow.tot b{font-size:16px}
  .cprow.tot .sub2{font-size:11px;color:var(--mut);font-weight:600}
  .donewrap{text-align:center;padding:10px 6px 4px}
  .donecheck{width:52px;height:52px;border-radius:50%;background:var(--ok);color:#fff;font-size:27px;font-weight:800;line-height:52px;margin:0 auto 12px}
  .donemsg{font-size:14px;color:#2a3340;line-height:1.5}
  .fine{font-size:11.5px;color:var(--mut);margin:10px 0 0;line-height:1.45}
  /* compact the wide plan modal so it fits the dashboard widget with minimal scroll */
  .modal.wide .m-h{padding:12px 18px}
  .modal.wide .m-b{padding:12px 18px}
  .modal.wide .plancard{padding:11px 12px}
  .modal.wide .ptag{margin:2px 0 7px}
  .modal.wide .plusline{margin-bottom:4px}
  .modal.wide .pfeat{gap:4px;margin-bottom:9px}
  .modal.wide .pfeat li{font-size:12px;line-height:1.3}
  .modal.wide .fine{margin-top:8px}
  .modal .m-h{padding:16px 20px;border-bottom:1px solid var(--line);flex:0 0 auto}
  .modal .m-b{overflow:auto;flex:1 1 auto}
  .modal .msg{flex:0 0 auto}
  .modal .m-h h3{font-size:16px;font-weight:800}
  .modal .m-h p{font-size:12.5px;color:var(--mut);margin-top:3px}
  .modal .m-b{padding:16px 20px;display:grid;gap:12px}
  .fld label{display:block;font-size:11.5px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;color:var(--mut);margin-bottom:5px}
  .fld input,.fld textarea,.fld select{width:100%;border:1.5px solid var(--line);border-radius:8px;padding:9px 11px;font:inherit;font-size:14px;background:#fff}
  .fld input:focus,.fld textarea:focus,.fld select:focus{outline:none;border-color:var(--teal)}
  .fld input[disabled]{background:#f3f5f8;color:var(--mut)}
  .two{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
  .m-f{padding:14px 20px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:flex-end;flex:0 0 auto;background:#fff}
  .msg{font-size:13px;font-weight:600;padding:0 20px 6px}
  .msg.ok{color:var(--ok)}.msg.err{color:#c2410c}
</style>
</head>
<body>
<div class="wrap" id="app"></div>

<div class="ovl" id="ovl"><div class="modal" id="modal"></div></div>

<script>
(function(){
  var q = new URLSearchParams(location.search), loc = q.get('loc')||'', view = q.get('view')||'main';
  var API='https://onevoice-checkout.vercel.app';
  var GHL='https://assistant.onesocial.ai/v2/location/'+loc;
  var D=null;
  function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
  function fmt(n){var d=String(n).replace(/[^0-9]/g,'').replace(/^1/,'');return d.length===10?'('+d.slice(0,3)+') '+d.slice(3,6)+'-'+d.slice(6):n;}
  function ftime(iso){if(!iso)return '';try{return new Date(iso).toLocaleString('en-US',{timeZone:'America/New_York',month:'short',day:'numeric',hour:'numeric',minute:'2-digit'})+' ET';}catch(e){return '';}}
  var app=document.getElementById('app'), ovl=document.getElementById('ovl'), modal=document.getElementById('modal');
  ovl.addEventListener('click',function(e){if(e.target===ovl)ovl.classList.remove('on');});

  function hdr(d){return '<div class="hdr"><div><h1>'+esc(d.company||'Your account')+'</h1><p>'+(d.realtor?esc(d.realtor)+' · ':'')+'OneVoice AI receptionist</p></div><div style="display:flex;align-items:center;gap:10px">'+(d.planTier?'<span class="badge">OneVoice '+(d.planTier==='pro'?'Pro':'Basic')+'</span>':'')+'<div class="logo">One<span>Voice</span></div></div></div>';}

  function stepsHtml(d){
    if(localStorage.getItem('ov_setup_hidden')==='1'){
      return '<div class="sec-h" style="padding:12px 22px 14px"><div style="display:flex;align-items:center;gap:10px"><span class="chk" style="background:var(--ok);border-color:var(--ok)">✓</span><h2 style="font-size:14px">You’re set up — your AI answers every call.</h2><a href="#" id="showSteps" style="font-size:12px;color:var(--teal-d);font-weight:700">Show the steps again</a></div></div>';
    }
    var s1=d.steps&&d.steps.numberBought, s2=d.steps&&d.steps.aiConnected, s3=localStorage.getItem('ov_app_done')==='1';
    function box(n,done,title,body,btns){return '<div class="step'+(done?' done':'')+'"><div class="top"><span class="chk">'+(done?'✓':'')+'</span><div><div class="stepnum">Step '+n+'</div><h3>'+title+'</h3></div></div><p>'+body+'</p>'+btns+'</div>';}
    return '<div class="sec-h" style="border-bottom:none"><div><div class="kicker">Getting set up</div><h2>Three quick steps and your AI is answering buyers 24/7</h2></div><a href="#" id="hideSteps" title="Hide this section" style="font-size:12px;color:var(--mut);font-weight:700;white-space:nowrap">✕ Hide</a></div><div class="steps">'
      +box(1,s1,'Get your free phone number','Pick any local number — takes about 2 minutes and it\'s on us. If a "Register for A2P" box pops up, just close it (you don\'t need it).','<a class="cta" target="_top" href="'+GHL+'/settings/phone_number">Pick my number →</a><a class="cta ghost" target="_blank" href="https://onevoice-checkout.vercel.app/assign-number.html">See the picture guide</a>')
      +box(2,s2,'Connect your number to your AI','One click — we wire your new number to your assistant automatically. From that moment your AI answers every call.','<button class="cta" id="connectBtn">Connect my number now</button>')
      +box(3,s3,'Take it everywhere','Download the LeadConnector app and log in with this same email — every call, transcript and lead lands on your phone.','<a class="cta" target="_blank" id="appBtn" href="https://apps.apple.com/app/lead-connector/id1564302502">Get the app</a>')
      +'</div>';
  }

  function listingsHtml(d){
    var rows=(d.listings||[]).map(function(l,i){
      var ini=(l.agent||'A').trim().charAt(0).toUpperCase();
      return '<tr><td class="addr" data-edit="'+i+'" title="Click to update this listing\'s details">'+esc(l.address)+'</td>'
        +'<td><span class="agent" data-rename="'+i+'" title="Click to rename your assistant"><span class="av">'+ini+'</span><span class="nm">'+esc(l.agent)+'</span></span></td>'
        +'<td class="num">'+(l.number?esc(fmt(l.number)):'—')+'</td>'
        +'<td>'+(l.live?'<span class="pill live">● Answering 24/7</span>':'<span class="pill wait">Waiting for number</span>')+'</td>'
        +'<td style="white-space:nowrap">'+(l.live?'':'<button class="rowbtn primaryish" data-connect="'+i+'" title="Connect a number you\'ve bought to this listing">Connect a number</button> ')+'<button class="rowbtn" data-mng="replace" data-idx="'+i+'">Replace</button> <button class="rowbtn danger" data-mng="cancel" data-idx="'+i+'">Cancel</button></td></tr>';
    }).join('');
    var body = rows ? '<table><thead><tr><th>Listing address</th><th>AI agent</th><th>Phone number</th><th>Status</th><th></th></tr></thead><tbody>'+rows+'</tbody></table><div class="hint">Tip: click a <b>listing</b> to update its details (price, beds, showings…) — click your <b>agent\'s name</b> to rename them.</div>'
      : '<div class="empty">Your AI assistant will appear here as soon as your account finishes setting up.</div>';
    return '<div class="sec-h"><div><div class="kicker">Your listings</div><h2>Every listing, its AI agent, and the number buyers call</h2></div></div>'+body
      +'<div class="sec-h" style="padding-top:4px"><div><div class="kicker">Manage</div></div></div><div class="mng"><button class="primary" data-mng="add">+ Add a listing</button><button data-mng="addnum">+ Add a phone number</button><button data-mng="plan">Manage my plan</button></div>';
  }

  function callsHtml(d){
    var calls=d.calls||[];
    var prop=(d.listings&&d.listings[0]&&d.listings[0].address)||'your listing';
    if(!calls.length) return '<div class="sec-h"><div><div class="kicker">Recent callers</div><h2>Every buyer your AI has talked to</h2></div></div><div class="empty">No calls yet — once your number is live, every caller shows up here with what they asked and how serious they are.</div>';
    var rows=calls.map(function(c,i){
      return '<tr class="row-main" data-call="'+i+'"><td style="font-weight:700">'+esc(c.name)+'</td><td>'+esc(prop)+'</td><td class="num">'+(c.phone?esc(fmt(c.phone)):'—')+'</td><td>'+esc(ftime(c.when))+'</td><td>'+(c.score?'<span class="scorebig">'+esc(c.score)+'</span>':'<span style="color:var(--mut)">—</span>')+'</td></tr>'
        +'<tr class="cdet" id="cdet'+i+'" hidden><td colspan="5"><div class="kv">'
        +'<b>Why they called</b><span>'+esc(c.reason||'—')+'</span>'
        +'<b>Notes & questions</b><span>'+esc(c.notes||'—')+'</span>'
        +(c.scoreReason?'<b>Why this score</b><span>'+esc(c.scoreReason)+'</span>':'')
        +'<b>Full transcript</b><span><a target="_top" style="color:var(--teal-d);font-weight:700" href="'+GHL+'/contacts/detail/'+esc(c.id)+'">Open this caller in your inbox →</a></span>'
        +'</div></td></tr>';
    }).join('');
    return '<div class="sec-h"><div><div class="kicker">Recent callers</div><h2>Every buyer your AI has talked to</h2></div></div><table class="calls"><thead><tr><th>Caller</th><th>Listing</th><th>Phone</th><th>When</th><th>Score</th></tr></thead><tbody>'+rows+'</tbody></table><div class="hint">Click any caller to see why they called, their key questions'+ (D&&D.planTier==='pro'?', their lead score':'') +' and the full transcript.</div>';
  }

  function planLabelFromKey(k){if(!k)return '—';var p=String(k).split('/');var tier=p[0]==='pro'?'Pro':'Basic';var term={monthly:'Monthly',quarter:'Every 3 months',annual:'Annual'}[p[1]]||p[1];return tier+' · '+term;}
  function planHistoryHtml(d){
    var h=(d.planHistory||[]); if(!h.length) return '';
    var rows=h.map(function(e){
      var when=e.ts?ftime(new Date(e.ts).toISOString()):'';
      var amt=e.deferred?'At renewal':((e.chargedCents>0)?money2(e.chargedCents):'$0');
      return '<tr><td>'+esc(planLabelFromKey(e.from))+' → <b>'+esc(planLabelFromKey(e.to))+'</b></td><td>'+esc(when)+'</td><td class="num">'+esc(amt)+'</td></tr>';
    }).join('');
    return '<div class="sec-h"><div><div class="kicker">Plan history</div><h2>Every plan change on your account</h2></div></div><table><thead><tr><th>Change</th><th>When</th><th>Charged</th></tr></thead><tbody>'+rows+'</tbody></table>';
  }
  function openModal(html){modal.innerHTML=html;modal.classList.remove('wide');ovl.classList.add('on');}
  function closeModal(){ovl.classList.remove('on');}

  function editListing(i){
    var l=D.listings[i];
    openModal('<div class="m-h"><h3>Update '+esc(l.address)+'</h3><p>Change anything below — your AI uses the new facts on the very next call. Only fill what changed.</p></div>'
      +'<div class="m-b"><div class="fld"><label>Listing address</label><input disabled value="'+esc(l.address)+'"><div style="font-size:11.5px;color:var(--mut);margin-top:4px">New property? Use <b>Replace a listing</b> in the Manage section instead.</div></div>'
      +'<div class="fld"><label>Asking price</label><input id="f_price" placeholder="$329,000"></div>'
      +'<div class="two"><div class="fld"><label>Beds</label><input id="f_beds" placeholder="3"></div><div class="fld"><label>Baths</label><input id="f_baths" placeholder="2"></div><div class="fld"><label>Sq ft</label><input id="f_sqft" placeholder="1,850"></div></div>'
      +'<div class="fld"><label>Showing availability</label><input id="f_showing" placeholder="Sat–Sun 1–4 PM, or by appointment"></div>'
      +'<div class="fld"><label>Listing details</label><textarea id="f_details" rows="3" placeholder="New roof 2024, motivated seller, HOA $95/mo…"></textarea></div></div>'
      +'<div class="msg" id="m_msg"></div><div class="m-f"><button class="cta ghost" onclick="document.getElementById(\'ovl\').classList.remove(\'on\')">Close</button><button class="cta" id="m_save">Save changes</button></div>');
    document.getElementById('m_save').addEventListener('click',function(){
      var b=this;b.textContent='Saving…';b.disabled=true;
      var body={action:'listing',loc:loc,agentId:l.id,price:val('f_price'),beds:val('f_beds'),baths:val('f_baths'),sqft:val('f_sqft'),showing:val('f_showing'),details:val('f_details')};
      post('/api/update-listing',body,function(d){flash(d);b.textContent='Save changes';b.disabled=false;});
    });
  }
  function connectNumber(i){
    var l=D.listings[i]; if(!l) return;
    var free=(D&&D.unassignedNumbers)||[];
    if(!free.length){
      openModal('<div class="m-h"><h3>Connect a number to '+esc(l.address)+'</h3><p>You don\'t have an unassigned phone number yet. Get one first, then come back and connect it to this listing.</p></div>'
        +'<div class="m-f"><button class="cta ghost" onclick="document.getElementById(\'ovl\').classList.remove(\'on\')">Close</button><button class="cta" id="m_addnum">+ Add a phone number</button></div>');
      document.getElementById('m_addnum').addEventListener('click',function(){var u=GHL+'/settings/phone_number';try{window.top.location.href=u;}catch(e){window.open(u,'_blank');}});
      return;
    }
    var opts=free.map(function(n){return '<option value="'+esc(n)+'">'+esc(fmt(n))+'</option>';}).join('');
    openModal('<div class="m-h"><h3>Connect a number to '+esc(l.address)+'</h3><p>Pick which of your phone numbers should ring this listing’s AI assistant, '+esc(l.agent)+'. Buyers who call it will reach '+esc(l.agent)+' about this property.</p></div>'
      +'<div class="m-b"><div class="fld"><label>Phone number for this listing</label><select id="f_num">'+opts+'</select></div></div>'
      +'<div class="msg" id="m_msg"></div><div class="m-f"><button class="cta ghost" onclick="document.getElementById(\'ovl\').classList.remove(\'on\')">Close</button><button class="cta" id="m_conn">Connect this number</button></div>');
    document.getElementById('m_conn').addEventListener('click',function(){
      var b=this;b.textContent='Connecting…';b.disabled=true;
      var num=val('f_num');
      fetch(API+'/api/connect-number?loc='+encodeURIComponent(loc)+'&agentId='+encodeURIComponent(l.id)+'&number='+encodeURIComponent(num))
        .then(function(r){return r.json();}).then(function(x){
          flash({ok:x.ok,message:x.message});
          if(x.ok){b.textContent='Connected!';setTimeout(function(){document.getElementById('ovl').classList.remove('on');load();},1000);}
          else{b.textContent='Connect this number';b.disabled=false;}
        }).catch(function(){flash({ok:false,message:'Network hiccup — try again.'});b.textContent='Connect this number';b.disabled=false;});
    });
  }
  function renameAgent(i){
    var l=D.listings[i];
    openModal('<div class="m-h"><h3>Rename your assistant</h3><p>Your assistant introduces themselves by this name on every call. The listing stays attached automatically.</p></div>'
      +'<div class="m-b"><div class="fld"><label>Assistant\'s name</label><input id="f_name" value="'+esc(l.agent)+'" maxlength="30"></div></div>'
      +'<div class="msg" id="m_msg"></div><div class="m-f"><button class="cta ghost" onclick="document.getElementById(\'ovl\').classList.remove(\'on\')">Close</button><button class="cta" id="m_save">Save name</button></div>');
    document.getElementById('m_save').addEventListener('click',function(){
      var b=this;b.textContent='Saving…';b.disabled=true;
      post('/api/update-listing',{action:'rename',loc:loc,agentId:l.id,newName:val('f_name')},function(d){flash(d);b.textContent='Save name';b.disabled=false;if(d.ok)setTimeout(load,900);});
    });
  }
  function money(c){return '$'+(c/100).toLocaleString(undefined,{minimumFractionDigits:0,maximumFractionDigits:2});}
  function addListing(){
    openModal('<div class="m-h"><h3>Add a listing</h3><p>Tell us about the new property and name its AI assistant — you’ll see the exact price change before you pay. It goes live the moment payment clears.</p></div>'
      +'<div class="m-b"><div class="fld"><label>New listing address</label><input id="f_addr" placeholder="88 Oak St, Pearl, MS"></div>'
      +'<div class="fld"><label>Listing details</label><textarea id="f_det" rows="3" placeholder="Price, beds/baths, showing times, selling points — this is what your AI tells buyers"></textarea></div>'
      +'<div class="fld"><label>AI assistant’s name</label><input id="f_asst" maxlength="30" placeholder="e.g. Ava"></div></div>'
      +'<div class="msg" id="m_msg"></div><div class="m-f"><button class="cta ghost" onclick="document.getElementById(\'ovl\').classList.remove(\'on\')">Close</button><button class="cta" id="m_next">Continue →</button></div>');
    document.getElementById('m_next').addEventListener('click',function(){
      var b=this, addr=val('f_addr'), det=val('f_det'), asst=val('f_asst');
      if(!addr){flash({ok:false,message:'Please enter the new listing’s address.'});return;}
      b.textContent='Checking your plan…';b.disabled=true;
      fetch(API+'/api/add-listing?loc='+encodeURIComponent(loc)).then(function(r){return r.json();}).then(function(q){
        if(!q.ok){flash(q);b.textContent='Continue →';b.disabled=false;return;}
        addListingSummary(addr,det,asst,q);
      }).catch(function(){flash({ok:false,message:'Network hiccup — try again.'});b.textContent='Continue →';b.disabled=false;});
    });
  }
  function addListingSummary(addr,det,asst,q){
    var planLabel=(q.tier==='pro'?'Pro':'Basic'), perMo=money(q.addMonthlyCents)+'/mo';
    var row=function(k,v){return '<div style="display:flex;justify-content:space-between;gap:14px;padding:7px 0;border-bottom:1px solid #eef1f4"><span style="color:#5a6677;flex:0 0 auto">'+k+'</span><span style="text-align:right;font-weight:600">'+v+'</span></div>';};
    openModal('<div class="m-h"><h3>Confirm your new listing</h3><p>Here’s exactly what changes. Nothing is billed until you complete payment on the next screen.</p></div>'
      +'<div class="m-b">'
      +row('New listing',esc(addr))
      +(det?row('Details',esc(det.length>90?det.slice(0,90)+'…':det)):'')
      +row('AI assistant',esc(asst||'Ava'))
      +row('Your plan',planLabel+' — '+q.count+' → '+q.newCount+' listings')
      +row('Monthly change','+'+perMo)
      +row('New plan total',money(q.newRecurringCents)+(q.term==='monthly'?'/mo':' per '+q.term))
      +row('Due today',money(q.setupCents)+' one-time setup')
      +'<p style="color:#5a6677;font-size:12.5px;margin:10px 0 0">No extra trial — the new listing is added to your current billing. After payment your AI agent is created automatically; then grab its phone number from Step 1 on your dashboard.</p>'
      +'</div><div class="msg" id="m_msg"></div><div class="m-f"><button class="cta ghost" id="m_back">← Back</button><button class="cta" id="m_pay">Proceed to payment</button></div>');
    document.getElementById('m_back').addEventListener('click',function(){addListing();});
    document.getElementById('m_pay').addEventListener('click',function(){
      var b=this;b.textContent='Opening secure checkout…';b.disabled=true;
      post('/api/add-listing',{loc:loc,address:addr,details:det,assistant:asst},function(d){
        if(d.ok&&d.url){try{window.top.location.href=d.url;}catch(e){window.open(d.url,'_blank');}b.textContent='Redirecting…';}
        else{flash(d);b.textContent='Proceed to payment';b.disabled=false;}
      });
    });
  }
  var PLANFEAT={
    basic:['Answers every call, 24/7','Screens & qualifies buyers','Books on the availability you set','Transcript + instant lead alert after every call'],
    pro:['AI Lead Analyzer — scores every caller so you call the hottest back first','Calendar-Synced Booking — Google, Outlook or Apple, around your real schedule','Lead Pipeline Dashboard — New → Contacted → Showing → Won, nothing slips','Answers texts, too — Ava handles inbound SMS like a call']
  };
  function fmtMo(c){return '$'+(c/100).toLocaleString(undefined,{minimumFractionDigits:0,maximumFractionDigits:2})+'/mo';}
  function money2(c){return '$'+(c/100).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});}
  function cadence(term){return term==='annual'?'per year':(term==='quarter'?'per 3 months':'per month');}
  function cardBrand(b){b=String(b||'').toLowerCase();var m={visa:'Visa',mastercard:'Mastercard',amex:'Amex',american_express:'Amex',discover:'Discover',diners:'Diners Club',jcb:'JCB',unionpay:'UnionPay'};return m[b]||(b?b.charAt(0).toUpperCase()+b.slice(1):'Card');}
  function shortTerm(l){return String(l).replace(/\s*\(.*\)\s*/,'');} // "Every 3 months (save 25%)" -> "Every 3 months"
  function managePlan(){
    openModal('<div class="m-h"><h3>Manage my plan</h3><p>Loading your current plan…</p></div><div class="m-b"><div class="empty">One moment…</div></div>');
    fetch(API+'/api/change-plan?loc='+encodeURIComponent(loc)).then(function(r){return r.json();}).then(function(q){
      if(!q.ok){openModal('<div class="m-h"><h3>Manage my plan</h3></div><div class="m-b"><div class="msg err">'+esc(q.message||'Could not load your plan.')+'</div></div><div class="m-f"><button class="cta ghost" onclick="document.getElementById(\'ovl\').classList.remove(\'on\')">Close</button></div>');return;}
      window._planQ=q;
      function termBtn(cell){
        var tt=esc(shortTerm(cell.termLabel)), tp=fmtMo(cell.perMonthCents);
        if(cell.current) return '<div class="tbtn cur"><div class="tt">'+tt+'</div><div class="tp">'+tp+'</div><div class="tn">✓ Your plan</div></div>';
        var note=cell.savePct>0?('Save '+cell.savePct+'%'):'Switch';
        return '<button class="tbtn" data-tier="'+cell.tier+'" data-term="'+cell.term+'"><div class="tt">'+tt+'</div><div class="tp">'+tp+'</div><div class="tn">'+note+'</div></button>';
      }
      function planCard(key){
        var p=q.plans[key], isCur=(q.tier===key);
        var feats=PLANFEAT[key].map(function(f){return '<li>'+f+'</li>';}).join('');
        var plus=key==='pro'?'<div class="plusline">Includes everything in Basic, plus:</div>':'';
        var terms=['monthly','quarter','annual'].map(function(tk){return termBtn(p.terms[tk]);}).join('');
        return '<div class="plancard'+(isCur?' cur':'')+'"><div class="ph"><span class="pn">'+esc(p.name)+(isCur?'<span class="curpill">Current</span>':'')+'</span></div>'
          +'<p class="ptag">'+esc(p.tagline)+'</p>'+plus+'<ul class="pfeat">'+feats+'</ul><div class="terms">'+terms+'</div></div>';
      }
      openModal('<div class="m-h"><h3>Manage my plan</h3><p>You’re on <b>'+esc(q.current.label)+'</b> — '+fmtMo(q.current.perMonthCents)+'. Two plans, three ways to pay each. Pick any option to switch — you’ll confirm first.</p></div>'
        +'<div class="m-b"><div class="planwrap">'+planCard('basic')+planCard('pro')+'</div>'
        +'<p class="fine"><b>Upgrades apply right away</b> — we charge the prorated difference to your card and your Pro tools turn on (refresh the dashboard; text &amp; calendar finish within ~1 hr). <b>Downgrades and shorter billing</b> take effect at your next renewal'+(q.renewalHuman?' ('+esc(q.renewalHuman)+')':'')+' with nothing charged today, and you keep what you’ve already paid for until then. Prices shown are per month for your '+q.count+' listing'+(q.count>1?'s':'')+'.</p></div>'
        +'<div class="msg" id="m_msg"></div><div class="m-f"><button class="cta ghost" onclick="document.getElementById(\'ovl\').classList.remove(\'on\')">Close</button></div>');
      modal.classList.add('wide');
      document.querySelectorAll('.tbtn[data-term]').forEach(function(e){e.addEventListener('click',function(){confirmPlan(this.dataset.tier,this.dataset.term);});});
    }).catch(function(){flash({ok:false,message:'Network hiccup — try again.'});});
  }
  function confirmPlan(tier,term){
    var q=window._planQ; if(!q)return; var cell=q.plans[tier].terms[term], cur=q.current;
    var toProNow=(cell.tier==='pro'&&q.tier!=='pro');
    var newName=(cell.tier==='pro'?'Pro':'Basic')+' · '+shortTerm(cell.termLabel)+' · '+q.count+' listing'+(q.count>1?'s':'');
    window._planPreview=null;
    openModal('<div class="m-h"><h3>Confirm plan change</h3></div><div class="m-b">'
      +'<div class="cprow"><span>From</span><b>'+esc(cur.label)+'<div class="sub">'+fmtMo(cur.perMonthCents)+'</div></b></div>'
      +'<div class="cprow"><span>To</span><b>'+esc(newName)+'<div class="sub">'+fmtMo(cell.perMonthCents)+'</div></b></div>'
      +'<div class="cprow tot"><span>New plan total</span><b>'+money2(cell.recurringCents)+' <span class="sub2">'+cadence(cell.term)+'</span></b></div>'
      +'<div class="cprow tot"><span>Due today</span><b id="cp_due">calculating…</b></div>'
      +'<p class="fine" id="cp_explain">Checking your billing…</p></div>'
      +'<div class="msg" id="m_msg"></div><div class="m-f"><button class="cta ghost" id="m_back2">← Back</button><button class="cta" id="m_apply">Confirm change</button></div>');
    // one coherent explanation, driven by the real billing state (no contradictions)
    fetch(API+'/api/change-plan?loc='+encodeURIComponent(loc)+'&preview=1&tier='+encodeURIComponent(cell.tier)+'&term='+encodeURIComponent(cell.term))
      .then(function(r){return r.json();}).then(function(p){
        window._planPreview=p||null;
        var due=document.getElementById('cp_due'), ex=document.getElementById('cp_explain');
        if(due){ due.textContent=(!p||!p.ok)?'Prorated difference':((p.dueTodayCents!=null)?money2(p.dueTodayCents):'Prorated difference'); }
        if(ex){
          if(!p||!p.ok){ ex.textContent='We’ll confirm the exact amount on the next screen.'; }
          else{
            var pm=(p.card&&p.card.label)?esc(p.card.label):'your payment method on file';
            var proTail=toProNow?' Refresh your dashboard afterward to see your Pro tools (lead scoring &amp; the pipeline board are instant; text-answering and calendar sync finish within about an hour).':'';
            if(p.trialing){ ex.innerHTML='You’re in your <b>free trial</b>, so <b>nothing is charged today</b>. Your plan switches over now — your first charge is on <b>'+esc(p.trialEndHuman||'your renewal date')+'</b> for <b>'+money2(p.recurringCents)+'</b>, billed to '+pm+'.'+proTail; }
            else if(p.deferred){ ex.innerHTML='This takes effect at your renewal on <b>'+esc(p.renewalHuman||'your renewal date')+'</b>. You keep <b>'+esc(cur.label)+'</b> until then, and <b>nothing is charged today</b> — your new rate then bills to '+pm+'.'; }
            else{ ex.innerHTML='We’ll charge <b>'+((p.dueTodayCents!=null)?money2(p.dueTodayCents):'the prorated difference')+'</b> to '+pm+' now and switch you to <b>'+esc(newName)+'</b> right away.'+proTail; }
          }
        }
      }).catch(function(){var due=document.getElementById('cp_due'); if(due)due.textContent='Prorated difference'; var ex=document.getElementById('cp_explain'); if(ex)ex.textContent='We’ll confirm the exact amount on the next screen.';});
    document.getElementById('m_back2').addEventListener('click',function(){managePlan();});
    document.getElementById('m_apply').addEventListener('click',function(){
      var b=this;b.textContent='Applying…';b.disabled=true;
      var pv=window._planPreview;
      post('/api/change-plan',{loc:loc,tier:cell.tier,term:cell.term,priceId:(pv&&pv.previewPriceId)||''},function(d){
        if(d.ok){ showPlanDone(d); load(); }
        else { flash(d); b.textContent='Confirm change'; b.disabled=false; }
      });
    });
  }
  function showPlanDone(d){
    var extra='';
    if(d.trialing){
      extra='<p class="fine" style="text-align:center">You can switch plans again anytime before your trial ends.</p>';
    } else if(d.deferred){
      extra='<p class="fine" style="text-align:center">Nothing was charged today — your card on file is billed at your next renewal'+(d.renewalHuman?' ('+esc(d.renewalHuman)+')':'')+'.</p>';
    } else {
      var amt=(d.chargedTodayCents!=null&&d.chargedTodayCents>0)?money2(d.chargedTodayCents):'';
      extra=(amt?'<div class="cprow tot" style="justify-content:center;gap:10px;margin-top:6px"><span>Charged today</span><b>'+amt+'</b></div>':'')
        +'<p class="fine" style="text-align:center">Billed to your card on file — no separate checkout needed. A receipt is emailed to you.</p>';
    }
    openModal('<div class="m-h"><h3>All set</h3></div><div class="m-b"><div class="donewrap"><div class="donecheck">✓</div><p class="donemsg">'+esc(d.message||'Your plan has been updated.')+'</p>'+extra+'</div></div>'
      +'<div class="m-f"><button class="cta" onclick="document.getElementById(\'ovl\').classList.remove(\'on\');">Done</button></div>');
  }
  function manage(kind, idx){
    if(kind==='add'){addListing();return;}
    if(kind==='plan'){managePlan();return;}
    if(kind==='addnum'){var u=GHL+'/settings/phone_number';try{window.top.location.href=u;}catch(e){window.open(u,'_blank');}return;}
    var cur = (idx!=null && D && D.listings && D.listings[idx]) ? D.listings[idx].address : '';
    var t={add:['Add a listing','Give us the new property’s address and details — we’ll spin up its AI agent and add it to your plan ($149/mo Basic · $249/mo Pro per extra listing; one-time $49 setup; no extra trial).'],
           replace:['Replace this listing','Sold it? Your phone number and agent stay — we swap in the new property. ($49 swap on Pro.)'],
           cancel:['Cancel this listing','Its agent stops answering and your monthly price drops accordingly.'],
           plan:['Manage my plan','Upgrade Basic ↔ Pro, change how you pay (monthly, 3-month, annual), or ask a billing question — we’ll take care of it and confirm before anything changes.']}[kind];
    var fields='';
    if(kind==='replace') fields='<div class="fld"><label>Replacing</label><input disabled value="'+esc(cur||'—')+'"></div><div class="fld"><label>New listing address</label><input id="f_listing" placeholder="88 Oak St, Pearl, MS"></div><div class="fld"><label>Listing details</label><textarea id="f_note" rows="3" placeholder="Price, beds/baths, showing times, selling points — this is what your AI tells buyers"></textarea></div>';
    else if(kind==='cancel') fields='<div class="fld"><label>Cancelling</label>'+(cur?'<input disabled value="'+esc(cur)+'">':'<input id="f_listing" placeholder="Property address">')+'</div><div class="fld"><label>Anything we should know?</label><textarea id="f_note" rows="2" placeholder="Optional"></textarea></div>';
    else if(kind==='plan') fields='<div class="fld"><label>What would you like to change?</label><textarea id="f_note" rows="3" placeholder="e.g. Upgrade me to Pro / switch me to annual billing"></textarea></div>';
    else fields='<div class="fld"><label>New listing address</label><input id="f_listing" placeholder="Property address"></div><div class="fld"><label>Listing details</label><textarea id="f_note" rows="3" placeholder="Price, beds/baths, showing times, selling points — this is what your AI tells buyers"></textarea></div>';
    openModal('<div class="m-h"><h3>'+t[0]+'</h3><p>'+t[1]+'</p></div>'
      +'<div class="m-b">'+fields+'</div>'
      +'<div class="msg" id="m_msg"></div><div class="m-f"><button class="cta ghost" onclick="document.getElementById(\'ovl\').classList.remove(\'on\')">Close</button><button class="cta" id="m_save">Send request</button></div>');
    document.getElementById('m_save').addEventListener('click',function(){
      var b=this;b.textContent='Sending…';b.disabled=true;
      var listing = (kind==='replace'&&cur) ? ('REPLACING: '+cur+' → NEW: '+val('f_listing')) : (cur||val('f_listing'));
      post('/api/manage-request',{loc:loc,action:kind,listing:listing,note:val('f_note')},function(d){flash(d);b.textContent='Send request';b.disabled=!!d.ok;});
    });
  }
  function val(id){var e=document.getElementById(id);return e?e.value:'';}
  function flash(d){var m=document.getElementById('m_msg');if(m){m.textContent=d.message||(d.ok?'Done!':'Something went wrong.');m.className='msg '+(d.ok?'ok':'err');}}
  function post(path,body,cb){fetch(API+path,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}).then(function(r){return r.json();}).then(cb).catch(function(){cb({ok:false,message:'Network hiccup — try again.'});});}

  function render(d){
    D=d;
    if(view==='setup'){ app.innerHTML='<div class="card">'+(localStorage.getItem('ov_setup_hidden')==='1'?stepsHtml(d):hdr(d)+stepsHtml(d))+'</div>'; }
    else if(view==='listings'){ app.innerHTML='<div class="card">'+listingsHtml(d)+'</div>'; }
    else if(view==='calls'){ app.innerHTML='<div class="card">'+callsHtml(d)+'</div>'; }
    else { app.innerHTML='<div class="card">'+listingsHtml(d)+'</div><div class="card">'+callsHtml(d)+'</div>'+((d.planHistory&&d.planHistory.length)?'<div class="card">'+planHistoryHtml(d)+'</div>':'')+'<div class="foot">Questions? Call us at (855) 770-0200 — a specialist will walk you through anything.</div>'; }
    var cb=document.getElementById('connectBtn');
    if(cb)cb.addEventListener('click',function(){var b=this;b.textContent='Connecting…';b.disabled=true;
      fetch(API+'/api/connect-number?loc='+encodeURIComponent(loc)).then(function(r){return r.json();}).then(function(x){b.textContent=x.assigned&&x.assigned.length?'Connected!':(x.already&&x.already.length?'Already connected!':'Buy your number first (Step 1)');b.disabled=false;load();});});
    var ab=document.getElementById('appBtn');
    if(ab)ab.addEventListener('click',function(){localStorage.setItem('ov_app_done','1');load();});
    app.querySelectorAll('[data-connect]').forEach(function(e){e.addEventListener('click',function(){connectNumber(+this.dataset.connect);});});
    app.querySelectorAll('[data-edit]').forEach(function(e){e.addEventListener('click',function(){editListing(+this.dataset.edit);});});
    app.querySelectorAll('[data-rename]').forEach(function(e){e.addEventListener('click',function(){renameAgent(+this.dataset.rename);});});
    app.querySelectorAll('[data-mng]').forEach(function(e){e.addEventListener('click',function(){manage(this.dataset.mng, this.dataset.idx!=null?+this.dataset.idx:null);});});
    var hs=document.getElementById('hideSteps'); if(hs)hs.addEventListener('click',function(ev){ev.preventDefault();localStorage.setItem('ov_setup_hidden','1');render(D);});
    var ss=document.getElementById('showSteps'); if(ss)ss.addEventListener('click',function(ev){ev.preventDefault();localStorage.removeItem('ov_setup_hidden');render(D);});
    app.querySelectorAll('[data-call]').forEach(function(e){e.addEventListener('click',function(){var d=document.getElementById('cdet'+this.dataset.call);if(d)d.hidden=!d.hidden;});});
  }
  function load(){
    fetch(API+'/api/panel-data?loc='+encodeURIComponent(loc)).then(function(r){return r.json();}).then(render)
    .catch(function(){app.innerHTML='<div class="card"><div class="empty">Could not load right now — refresh in a moment.</div></div>';});
  }
  if(loc)load(); else app.innerHTML='<div class="card"><div class="empty">Missing account id.</div></div>';
})();
</script>
</body>
</html>
